<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#111113"/>

  <!-- image frame -->
  <rect x="3" y="5" width="26" height="19" rx="2" fill="#1e1e24" stroke="#3A3A42" stroke-width="1"/>

  <!-- sky -->
  <rect x="4" y="6" width="24" height="10" rx="1" fill="#1a2535"/>

  <!-- sun -->
  <circle cx="23" cy="10" r="2.8" fill="#FFAA00"/>

  <!-- ground -->
  <rect x="4" y="16" width="24" height="7" rx="0" fill="#1a2a1a"/>

  <!-- mountain left -->
  <polygon points="5,16 13,8 21,16" fill="#2a3d2a"/>
  <!-- mountain right, slightly behind -->
  <polygon points="14,16 21,9 28,16" fill="#243624"/>

  <!-- image border bottom notch: pixel dots fading out -->
  <rect x="4"  y="26" width="4" height="4" rx="1" fill="#FFAA00"/>
  <rect x="10" y="26" width="4" height="4" rx="1" fill="#FFAA00" opacity="0.55"/>
  <rect x="16" y="26" width="4" height="4" rx="1" fill="#FFAA00" opacity="0.25"/>
  <rect x="22" y="26" width="4" height="4" rx="1" fill="#FFAA00" opacity="0.1"/>
</svg>
